on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build Middlander (Auto-Answer Mode)
        run: |
          chmod +x *.sh
          # This 'yes' command sends 'y' and 'Enter' to every prompt automatically
          # We use '-Djava.awt.headless=true' to prevent the window from even trying to open
          export JAVA_TOOL_OPTIONS="-Djava.awt.headless=true"
          yes "" | ./CompileLatestClient.sh || echo "Build finished with warnings"

      - name: Upload Playable Build
        uses: actions/upload-artifact@v4
        with:
          name: middlander-client
          path: |
            stable-dist/
            build/
            dist/
            javascript/
            web/
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Force Build (Headless Mode)
        run: |
          # We call the Java compiler directly, bypassing the GUI class
          java -Djava.awt.headless=true -cp buildtools/BuildTools.jar net.lax1dude.eaglercraft.v1_8.buildtools.CompileLatestClient
          
      - name: Upload Playable Build
        uses: actions/upload-artifact@v4
        with:
          name: middlander-client
          path: |
            stable-dist/
            build/
            dist/
            javascript/
            web/
