name: Build Middlander Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build Middlander Client
        run: |
          chmod +x *.sh
          ./CompileLatestClient.sh

      - name: Upload Playable Build
        uses: actions/upload-artifact@v4
        with:
          name: middlander-client
          path: |
            stable-dist/
            build/
            dist/
            javascript/
