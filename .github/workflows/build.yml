name: Build Middlander Engine

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build Middlander Client
        run: |
          chmod +x *.sh
          # We run the build and ignore errors for a second to see what happens
          ./CompileLatestClient.sh || echo "Build script finished with issues"

      - name: Diagnostic - List All Files
        run: |
          echo "Listing all files to find the output..."
          find . -maxdepth 3 -not -path '*/.*'

      - name: Upload Playable Build
        uses: actions/upload-artifact@v4
        with:
          name: middlander-client
          path: |
            stable-dist/
            build/
            dist/
            javascript/
            web/
