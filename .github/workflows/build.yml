name: Build Middlander Engine
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          
      - name: Build Client
        run: |
          chmod +x *.sh
          export JAVA_TOOL_OPTIONS="-Djava.awt.headless=true"
          yes "" | ./CompileLatestClient.sh || true
          
      - uses: actions/upload-artifact@v4
        with:
          name: middlander-client
          path: |
            stable-dist/
            build/
            dist/
            javascript/
            web/
